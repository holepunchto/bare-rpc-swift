name: Test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: darwin
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install Bare runtime
        run: npm install -g bare
      - name: Install fixture dependencies
        working-directory: Tests/BareRPCTests/Fixtures
        run: npm install
      - uses: holepunchto/actions/swift-base@v1
      - run: swift format lint --recursive --strict .
      - run: swift build
      - run: swift test
